<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomokari! - Settings</title>
    <link rel="stylesheet" href="Setting.css">
</head>
<body>

    <div class="app-container">

        <aside class="sidebar">
            <div class="logo">
                <span class="sun">✺</span>
                <h1>Tomokari!</h1>
            </div>
            
            <div class="profile-card">
                <div class="avatar-container">
                    <img src="https://via.placeholder.com/100" alt="Amba Morningstar" class="main-avatar">
                </div>
                <h3>Amba Morningstar</h3>
                <p class="username">@ambamrngstar</p>
            </div>
            
            <nav class="nav-menu">
                <a href="MainPage.html" class="nav-item active"><i class="fa-solid fa-newspaper"></i> News feeds</a>
                <a href="Massages.html" class="nav-item"><i class="fa-solid fa-envelope"></i> Messages</a>
                <a href="Friends.html" class="nav-item"><i class="fa-solid fa-users"></i> Friends</a>
                <a href="EventMenuPage.html" class="nav-item"><i class="fa-solid fa-calendar-days"></i> Events</a>
                <a href="Setting.html" class="nav-item"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>
        </aside>

        <main class="content-area">
            <div class="settings-box">
                <div class="settings-list">
                    <div class="settings-item">Account Center</div>
                    <div class="settings-item">Your Information & permissions</div>
                    <div class="settings-item">Password & Security</div>
                    <div class="settings-item">Blocked</div>
                </div>
                <div class="logout-item">Log Out</div>
            </div>
        </main>
    </div> 

</body>
</html>
