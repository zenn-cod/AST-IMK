<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BlockedProfile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="BlockedProfile.css">
</head>
<body>

    <div class="container">
        
        <aside class="sidebar">
            <div class="logo">
        <span class="sun">✺</span>
        <h1>Tomokari!</h1>
    </div>
            
            <div class="profile-card">
                <div class="avatar-container">
                    <img src="foto/dreamybull.jpg" alt="Amba Morningstar" class="main-avatar">
                </div>
                <h3>Amba Mornigstar</h3>
                <p class="username">@ambamrngstar</p>
            </div>
            
            <nav class="nav-menu">
                <a href="MainPage.html" class="nav-item"><i class="fa-solid fa-newspaper"></i> News feeds</a>
                <a href="Massages.html" class="nav-item"><i class="fa-solid fa-envelope"></i> Messages</a>
                <a href="Friends.html" class="nav-item"><i class="fa-solid fa-users"></i> Friends</a>
                <a href="EventMenuPage.html" class="nav-item"><i class="fa-solid fa-calendar-days"></i> Events</a>
                <a href="Setting.html" class="nav-item"><i class="fa-solid fa-gear"></i> Setting</a>
            </nav>
        </aside>

        <main class="main-content">
            <h1 class="page-title">Profile</h1>
            
            <div class="content-layout">
                <div class="profile-area">
                    <div class="cover-photo"></div>
                    
                    <div class="profile-status-bar">
                        <div class="avatar-placeholder">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div class="status-message">
                            <span>User Not Found</span>
                            <i class="fa-solid fa-triangle-exclamation alert-icon"></i>
                        </div>
                    </div>

                    <div class="share-box">
                    <div class="input-row">
                        <input type="text" id="postInput" placeholder="Share something!">
                        <i class="fa-regular fa-face-smile smile-icon"></i>
                    </div>
                    <div class="action-row">
                        <div class="tools">
                            <span><i class="fa-regular fa-image"></i> Image</span>
                            <span><i class="fa-solid fa-location-dot"></i> Location</span>
                            <span class="dropdown-public"><i class="fa-solid fa-earth-americas"></i> Public <i class="fa-solid fa-chevron-down"></i></span>
                        </div>
                        <button class="btn-send">Send</button>
                    </div>
                </div>
                </div>

                <aside class="right-widget">
                    <div class="widget-box"></div>
                </aside>
            </div>
        </main>

    </div>

</body>
</html>
