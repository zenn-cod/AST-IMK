<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tomokari! - Profile Delete Post</title>
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="ProfileDeletePost.css">
</head>
<body class="bg-gray-100 flex h-screen">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="profile">
      <img src="profile.jpg" alt="Profile" class="avatar">
      <h2>Amba Morningstar</h2>
      <p>@ambamrngstar</p>
    </div>
    <nav>
      <a href="#">News feeds</a>
      <a href="#">Messages</a>
      <a href="#">Friends</a>
      <a href="#">Media</a>
      <a href="#">Setting</a>
    </nav>
  </aside>

  <!-- Main content -->
  <main class="main-content">
    <!-- Cover + Profile -->
    <section class="cover-section">
      <div class="cover"></div>
      <div class="flex items-center gap-4 mt-[-40px]">
        <img src="amba.jpg" alt="Amba" class="avatar-large">
        <div>
          <h2 class="font-semibold text-lg">Amba Morningstar</h2>
          <p class="text-gray-500">@ambamrngstar</p>
        </div>
      </div>
    </section>

    <!-- Post -->
    <section class="post">
      <p class="mb-3 font-medium">Gawatak garis api unggun, hiyakkkkk!</p>
      <img src="campfire.jpg" class="rounded-md mb-3">
      <div class="flex gap-4 text-sm text-gray-600">
        <span>🔥 1 Like</span>
        <span>💬 0 Comments</span>
        <button class="btn btn-danger btn-sm">Delete Post</button>
      </div>
    </section>

    <!-- Share something -->
    <section class="share">
      <textarea placeholder="Share something!" class="textarea"></textarea>
      <div class="flex justify-between items-center mt-2">
        <div class="options">
          <button>Image</button>
          <button>Location</button>
          <button>Public</button>
        </div>
        <button class="btn-send">Send</button>
      </div>
    </section>
  </main>

  <!-- Right sidebar -->
  <aside class="event-box">
    <h3 class="font-semibold mb-2">Upcoming Event!</h3>
    <p class="font-medium">Konser Bernadya MBG</p>
    <p class="text-sm text-gray-600">18:00 - 21:00</p>
    <p class="text-sm text-gray-600">5 km Sorom dak ketey...</p>
    <button class="btn btn-warning w-100 mt-2">Invite Participant</button>
  </aside>
</body>
</html>
